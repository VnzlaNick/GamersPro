<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .news-shadow {
            box-shadow: 0px 10px 30px rgba(0,0,0,0.05);
        }
        .active-nav-glow {
            filter: drop-shadow(0 0 8px rgba(29, 161, 242, 0.4));
        }
        .hide-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .hide-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        /* Drawer animation support */
        .drawer-open #side-drawer {
            transform: translateX(0);
        }

            opacity: 1;

<body class="bg-background text-on-background font-body-md min-h-screen pb-24">
<!-- Navigation Drawer -->
<div class="fixed inset-0 bg-black/50 z-[60] opacity-0 pointer-events-none transition-opacity duration-300" id="drawer-backdrop" onclick="toggleDrawer()"></div>
<aside class="fixed top-0 left-0 h-full w-[280px] bg-surface-container-lowest z-[70] -translate-x-full transition-transform duration-300 ease-in-out shadow-2xl flex flex-col" id="side-drawer">
<div class="p-6 border-b border-outline-variant flex items-center justify-between bg-primary-container/10">
<h2 class="text-display-lg font-display-lg text-primary tracking-tighter">Nuevo post</h2>
<button class="p-2 rounded-full hover:bg-surface-container-low transition-colors" onclick="toggleDrawer()">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
</div>
<nav class="flex-1 overflow-y-auto p-4 space-y-2">
<a class="flex items-center gap-4 p-4 rounded-xl text-primary font-title-sm bg-primary/10 transition-colors" href="index.html">
<span class="material-symbols-outlined">home</span>
            Inicio
        </a>
<a class="flex items-center gap-4 p-4 rounded-xl text-on-surface-variant font-title-sm hover:bg-surface-container-low transition-colors" href="#">
<span class="material-symbols-outlined">sports_esports</span>
            Torneos
        </a>
<a class="flex items-center gap-4 p-4 rounded-xl text-on-surface-variant font-title-sm hover:bg-surface-container-low transition-colors" href="#">
<span class="material-symbols-outlined">groups</span>
            Comunidad
        </a>
<a class="flex items-center gap-4 p-4 rounded-xl text-on-surface-variant font-title-sm hover:bg-surface-container-low transition-colors" href="#">
<span class="material-symbols-outlined">leaderboard</span>
            Ranking
        </a>
<a class="flex items-center gap-4 p-4 rounded-xl text-on-surface-variant font-title-sm hover:bg-surface-container-low transition-colors" href="#">
<span class="material-symbols-outlined">person</span>
            Mi Perfil
        </a>
</nav>
<div class="p-4 border-t border-outline-variant">
<button class="w-full flex items-center justify-center gap-2 p-3 text-error font-title-sm hover:bg-error-container/20 rounded-lg transition-colors" onclick="toggleDrawer()">
<span class="material-symbols-outlined">logout</span>
            Cerrar
        </button>
</div>
</aside>

<!-- TopAppBar (Primary) -->
<header class="sticky top-0 w-full z-50 bg-surface-container-lowest border-b border-outline-variant">
<div class="flex items-center justify-between px-4 h-14 w-full">
<button aria-label="Cerrar" class="active:scale-95 transition-transform duration-200 hover:bg-surface-container-low p-2 rounded-full" onclick="window.history.back()">
<span class="material-symbols-outlined text-on-surface-variant">close</span>
</button>
<h1 class="text-headline-md font-headline-md text-on-surface">Nuevo Post</h1>
<button class="bg-primary text-on-primary text-title-sm font-bold px-5 py-2 rounded-full hover:opacity-90 transition-opacity active:scale-95 transition-transform">
                Publicar
            </button>
</div>
</header>

<!-- Main Content Area -->
<main class="flex-grow flex flex-col p-4 space-y-6">
<!-- User Info & Community Selector -->
<div class="flex items-center space-x-3">
<div class="w-10 h-10 rounded-full border border-outline-variant overflow-hidden">
<img class="w-full h-full object-cover" alt="Perfil" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAn5h7PZ9qBj6B2ENxwptovv_4U2zL9IhLww2PijXr-dYeAxMh4ruyhiYeF2Fq9CtmV8xqa0iaNHKIjWW5k5E6f_qRa4hAk2IHh9ls6Rntin_kTa4AEGZOmkvR7XdT-WLleiZoriX5wTyq5NWArXe3rx3cbEhR7DEIX8nRlkzLqF_lZhLm8LlgDtvp3Ypekni_WOxya2oWRhtcN_yL-4VD0kzEOp7BMwMkMcVp91eiD9IZjwkY6-9iW_fwJRaOVELmBvcJf42Y_97A"/>
</div>
<div class="flex-grow">
<div class="relative">
<select class="appearance-none w-full bg-surface-container border border-outline-variant rounded-lg py-2 px-4 pr-10 text-body-md font-bold text-primary focus:ring-2 focus:ring-primary focus:outline-none transition-all cursor-pointer">
<option value="">Seleccionar Comunidad</option>
<option selected="" value="rakion">Rakion</option>
<option value="bloody-striker">Bloody Striker</option>
<option value="general">Comunidad General</option>
</select>
<span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 text-on-surface-variant pointer-events-none">expand_more</span>
</div>
</div>
</div>

<!-- Content Editor -->
<div class="flex-grow flex flex-col">
    <!-- User Input ID Field -->
    <div class="mb-4">
        <label for="post-id" class="block text-label-bold font-label-bold text-on-surface-variant mb-1 uppercase">ID de Usuario para Foro</label>
        <input type="text" id="post-id" placeholder="Ingresa tu ID de usuario" class="w-full bg-surface-container border border-outline-variant rounded-lg py-2 px-4 text-body-md focus:ring-2 focus:ring-primary focus:outline-none transition-all" />
    </div>
    
<textarea autofocus="" id="post-content" class="w-full flex-grow bg-transparent border-none focus:ring-0 text-body-md min-h-[200px] resize-none placeholder:text-on-surface-variant/50" placeholder="¡Comparte algo con la comunidad!"></textarea>
</div>

<!-- Preview/Selected Area -->
<div class="border-t border-outline-variant pt-4">
<div class="bg-surface-container rounded-xl p-4 border border-outline-variant/50 flex items-center space-x-4">
<div class="w-12 h-12 bg-primary-container rounded-lg flex items-center justify-center text-primary">
<span class="material-symbols-outlined">rocket_launch</span>
</div>
<div>
<p class="text-label-sm font-label-sm text-on-surface-variant uppercase">Sugerencia</p>
<p class="text-body-md font-bold">Añade una imagen para +40% alcance</p>
</div>
</div>
</div>
</main>

<!-- Attachment Bar (Bottom Anchor) -->
<div class="fixed bottom-0 left-0 w-full bg-surface-container/80 backdrop-blur-md border-t border-outline-variant p-4 pb-8 flex items-center justify-between z-50">
<div class="flex items-center space-x-2">
<button class="w-10 h-10 rounded-lg bg-primary-container text-on-primary-container flex items-center justify-center hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">image</span>
</button>
<button class="w-10 h-10 rounded-lg bg-primary-container text-on-primary-container flex items-center justify-center hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">videocam</span>
</button>
<button class="w-10 h-10 rounded-lg bg-primary-container text-on-primary-container flex items-center justify-center hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined">link</span>
</button>
<button class="w-10 h-10 rounded-lg bg-primary-container text-on-primary-container flex items-center justify-center hover:opacity-80 transition-opacity active:scale-95 transition-transform">
<span class="material-symbols-outlined">equalizer</span>
</button>
</div>
<div class="flex items-center text-on-surface-variant space-x-1">
<span class="text-label-sm font-label-sm" id="char-counter">0 / 280</span>
</div>
</div>

<script>
    function toggleDrawer() {
        document.body.classList.toggle('overflow-hidden');
        document.body.classList.toggle('drawer-open');
    }

    document.addEventListener('DOMContentLoaded', () => {
        const textarea = document.getElementById('post-content');
        const counter = document.getElementById('char-counter');
        const userIdInput = document.getElementById('post-id');
        
        textarea.addEventListener('input', (e) => {
            const length = e.target.value.length;
            counter.textContent = `${length} / 280`;
            
            if (length > 250) {
                counter.classList.add('text-error');
            } else {
                counter.classList.remove('text-error');
            }
        });

        // Simulación de envío con ID para el foro
        document.querySelector('button.bg-primary').addEventListener('click', () => {
            const id = userIdInput.value;
            const content = textarea.value;
            
            if (!id) {
                alert('Por favor, ingresa tu ID para conectarte al foro.');
                userIdInput.focus();
                return;
            }
            
            if (!content) {
                alert('El contenido no puede estar vacío.');
                textarea.focus();
                return;
            }

            console.log(`Enviando al foro con ID: ${id}`, { content });
            alert('¡Post enviado con éxito al foro!');
        });
    });
</script>
</body></html>
